name: Update Second Brain

concurrency:
  group: update-second-brain
  cancel-in-progress: false

on:
  push:
    paths-ignore:
      - "ai-index/**"
  schedule:
    - cron: "0 * * * *"
    - cron: "30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-brain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Gemini updater
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/update_brain.py

      - name: Commit AI updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ai-index/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "update ai index"
          git pull --rebase origin main || { echo "Rebase failed, skipping push"; exit 0; }
          git push origin main